<header class="site-header">
  <h1 class="blog-title"><a href="/">{{ .Site.Title }}.</a></h1>
  <p class="blog-tagline">{{ .Site.Params.tagline }}</p>
</header>

<nav class="site-nav">
  <a href="/" {{ if .IsHome }}class="active"{{ end }}>Blog</a>
  <a href="/ueber/" {{ if eq .RelPermalink "/ueber/" }}class="active"{{ end }}>Über</a>
  <a href="/kurioses/" {{ if or (eq .Section "kurioses") (eq .RelPermalink "/kurioses/") }}class="active"{{ end }}>Kurioses</a>
</nav>
