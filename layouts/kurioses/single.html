{{ define "main" }}
<div class="back-link"><a href="/kurioses/">Zurück zu Kurioses</a></div>

<div class="post-header">
  <span class="kurioses-badge">Kurioses</span>
  <h2 class="post-title">{{ .Title }}</h2>
  <p class="post-date">{{ partial "date-de.html" .Date }}</p>
</div>

<div class="post-body kurioses-body">
  {{ .Content }}
</div>

<div class="post-nav">
  {{ with .PrevInSection }}
  <a href="{{ .Permalink }}">← {{ .Title }}</a>
  {{ else }}
  <span></span>
  {{ end }}
  {{ with .NextInSection }}
  <a href="{{ .Permalink }}">{{ .Title }} →</a>
  {{ else }}
  <span></span>
  {{ end }}
</div>
{{ end }}
