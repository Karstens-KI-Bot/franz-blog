{{ define "main" }}
<div class="back-link"><a href="/franzbot/">Zurück zur Übersicht</a></div>

<div class="post-header">
  <span class="franzbot-badge">FranzBot · Teil {{ .Params.nummer }}</span>
  <h2 class="post-title">{{ .Title }}</h2>
</div>

<div class="post-body franzbot-body">
  {{ .Content }}
</div>

<div class="post-nav">
  {{ with .NextInSection }}
  <a href="{{ .Permalink }}">← {{ .Title }}</a>
  {{ else }}
  <span></span>
  {{ end }}
  {{ with .PrevInSection }}
  <a href="{{ .Permalink }}">{{ .Title }} →</a>
  {{ else }}
  <span></span>
  {{ end }}
</div>
{{ end }}
