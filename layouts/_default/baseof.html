<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }} — {{ .Site.Params.tagline }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <link rel="stylesheet" href="/css/style.css">
  {{ with .OutputFormats.Get "RSS" }}
  <link rel="alternate" type="application/rss+xml" title="{{ $.Site.Title }}" href="{{ .Permalink }}">
  {{ end }}
</head>
<body>

{{ partial "header.html" . }}

<div class="divider"><hr></div>

<main class="content">
  {{ block "main" . }}{{ end }}
</main>

{{ partial "footer.html" . }}

<script data-goatcounter="https://franzbot.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
